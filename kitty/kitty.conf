# ============================================================================
#  kitty config — Tokyo Night, JetBrainsMono Nerd Font, heavy frosted glass
#  Tuned to look good without hurting perf/battery. See notes at bottom.
#  Reload live: cmd+ctrl+, (or restart kitty). Full default ref: kitty.conf.bak
# ============================================================================

# --- Colors -----------------------------------------------------------------
include theme.conf

# --- Font -------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Programming ligatures, but disabled under the cursor so editing is unambiguous.
disable_ligatures cursor

# Slightly more vertical breathing room for readability (% of cell).
modify_font cell_height 105%

# --- Transparency & blur (heavy frosted) ------------------------------------
background_opacity 0.75
background_blur 64
# Allow runtime opacity toggling (keymaps below); only the bg is translucent,
# so text/glyphs stay fully crisp.
dynamic_background_opacity yes

# --- Window chrome / padding ------------------------------------------------
window_padding_width 14 16
# Keep macOS traffic-light buttons but drop the title bar for a cleaner look.
hide_window_decorations titlebar-only
macos_titlebar_color background
macos_show_window_title_in none

# --- Tab bar (powerline) ----------------------------------------------------
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1
tab_title_template      "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# --- Cursor -----------------------------------------------------------------
cursor_shape           beam
cursor_trail           0
cursor_trail_decay     0.1 0.4
cursor_blink_interval  0

# --- Scrollback & mouse -----------------------------------------------------
scrollback_lines       10000
copy_on_select         yes
strip_trailing_spaces  smart
mouse_hide_wait        3.0

# --- Bell -------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# --- macOS niceties ---------------------------------------------------------
macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# --- Performance / battery --------------------------------------------------
# Cap repaints to the display refresh rate = no wasted GPU cycles / battery.
sync_to_monitor yes
# (repaint_delay 10ms / input_delay 3ms are the efficient kitty defaults.)

# --- Handy keymaps ----------------------------------------------------------
# Toggle background to fully opaque (screenshots/focus) and back to frosted.
map cmd+shift+o set_background_opacity 1.0
map cmd+shift+i set_background_opacity 0.75
# Reload this config without restarting.
map cmd+ctrl+, load_config_file
# Search/browse scrollback in a pager.
map cmd+f show_scrollback
# Last command's output in a pager (uses kitty shell integration).
map cmd+g show_last_command_output
# Keyboard hints to open a URL on screen.
map cmd+o open_url_with_hints
# Jump between shell prompts in scrollback.
map cmd+up scroll_to_prompt -1
map cmd+down scroll_to_prompt 1
# Cycle split layouts.
map cmd+l next_layout
# iTerm-style explicit splits, inheriting the current directory.
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current

# ============================================================================
#  Perf/battery notes:
#  - background_blur is a one-shot GPU compositor effect on macOS — negligible
#    battery cost, not a per-frame redraw.
#  - sync_to_monitor + default repaint_delay keep idle GPU use near zero.
#  - cursor_trail is a short GPU animation only while the cursor moves; set to
#    0 if you ever want it fully off.
# ============================================================================
